<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Design Presentation</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        #carousel {
            display: flex; width: 100vw; height: 100vh;
            overflow-x: auto; overflow-y: hidden;
            scroll-snap-type: x mandatory; 
            -webkit-overflow-scrolling: touch; 
            scrollbar-width: none; 
            opacity: 0; transition: opacity 0.4s ease;
            scroll-behavior: smooth;
        }
        #carousel.ready { opacity: 1; }
        #carousel::-webkit-scrollbar { display: none; }

        .slide {
            flex: 0 0 100vw; height: 100vh;
            scroll-snap-align: center;
            display: flex; justify-content: center; align-items: center;
        }
        .slide img {
            max-width: 100%; max-height: 100%;
            object-fit: contain; pointer-events: none;
        }

        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #444; font-size: 14px; }

        /* Updated Pagination: Auto-hides and has better contrast */
        #pagination {
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%);
            display: flex; 
            gap: 10px; 
            z-index: 20; 
            padding: 8px 12px;
            border-radius: 20px;
            background-color: rgba(0, 0, 0, 0.3); /* Subtle backdrop for visibility */
            backdrop-filter: blur(4px); /* iOS style blur */
            opacity: 0; /* Hidden by default */
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        #pagination.visible { opacity: 1; }

        .dot { 
            width: 6px; height: 6px; 
            border-radius: 50%; 
            background-color: rgba(255,255,255,0.3); 
            transition: all 0.3s ease; 
        }
        .dot.active { 
            background-color: rgba(255,255,255,1); 
            transform: scale(1.3); 
        }

        #filename-overlay {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 25px 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            color: white; text-align: center; font-size: 13px; letter-spacing: 0.5px;
            z-index: 30; opacity: 0; transform: translateY(-10px);
            transition: all 0.25s ease; pointer-events: none;
        }
        #filename-overlay.show { opacity: 1; transform: translateY(0); }

        .tap-zone { position: fixed; top: 0; height: 100%; z-index: 10; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        #next-zone { right: 0; width: 60%; }
        #prev-zone { left: 0; width: 40%; }
    </style>
</head>
<body>

    <div id="loader">Loading...</div>
    <div id="filename-overlay"></div>
    <div id="carousel"></div>
    <div id="pagination"></div>
    
    <div id="prev-zone" class="tap-zone"></div>
    <div id="next-zone" class="tap-zone"></div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const githubUsername = "davidvb"; 
        const githubRepo = "GrnLb-DSGNS"; 
        const folderPath = "images"; // The name of the folder where you'll keep your screenshots
        // ==========================================
        
        const carousel = document.getElementById('carousel');
        const overlay = document.getElementById('filename-overlay');
        const pagination = document.getElementById('pagination');
        let slidesData = [];
        let dots = [];
        let pressTimer;
        let hidePaginationTimer;

        async function loadImages() {
            try {
                const response = await fetch(`https://api.github.com/repos/${githubUsername}/${githubRepo}/contents/${folderPath}`);
                const files = await response.json();
                const imageFiles = files.filter(f => f.name.match(/\.(jpg|jpeg|png|gif|webp)$/i));

                imageFiles.forEach((file, index) => {
                    const slide = document.createElement('div');
                    slide.className = 'slide';
                    const img = document.createElement('img');
                    img.src = file.download_url;
                    img.dataset.name = file.name;
                    slide.appendChild(img);
                    carousel.appendChild(slide);
                    slidesData.push(slide);

                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    pagination.appendChild(dot);
                    dots.push(dot);
                });

                if (slidesData.length > 1) {
                    carousel.insertAdjacentElement('afterbegin', slidesData[slidesData.length-1].cloneNode(true));
                    carousel.appendChild(slidesData[0].cloneNode(true));
                    setTimeout(() => {
                        carousel.scrollLeft = carousel.offsetWidth;
                        document.getElementById('loader').style.display = 'none';
                        carousel.classList.add('ready'); 
                    }, 50);
                    carousel.addEventListener('scroll', handleScroll);
                } else {
                    document.getElementById('loader').style.display = 'none';
                    carousel.classList.add('ready');
                }
            } catch (e) { document.getElementById('loader').innerText = "Error loading."; }
        }

        function showPaginationBriefly() {
            pagination.classList.add('visible');
            clearTimeout(hidePaginationTimer);
            hidePaginationTimer = setTimeout(() => {
                pagination.classList.remove('visible');
            }, 1200); // Fades out after 1.2 seconds of no movement
        }

        function handleScroll() {
            showPaginationBriefly();
            const w = carousel.offsetWidth, x = carousel.scrollLeft;
            let idx = Math.round(x / w);
            let dotIdx = (idx === 0) ? slidesData.length - 1 : (idx > slidesData.length) ? 0 : idx - 1;
            dots.forEach((d, i) => d.classList.toggle('active', i === dotIdx));

            if (x <= 5) teleport(w * slidesData.length);
            else if (x >= w * (slidesData.length + 1) - 5) teleport(w);
        }

        function teleport(pos) {
            clearTimeout(window.tpTimer);
            window.tpTimer = setTimeout(() => {
                carousel.style.scrollBehavior = 'auto';
                carousel.scrollLeft = pos;
                carousel.style.scrollBehavior = 'smooth';
            }, 300);
        }

        function showName() {
            const w = carousel.offsetWidth;
            const idx = Math.round(carousel.scrollLeft / w);
            const realIdx = (idx === 0) ? slidesData.length - 1 : (idx > slidesData.length) ? 0 : idx - 1;
            overlay.innerText = slidesData[realIdx].querySelector('img').dataset.name;
            overlay.classList.add('show');
        }

        function hideName() { overlay.classList.remove('show'); }

        window.addEventListener('mousedown', () => pressTimer = setTimeout(showName, 500));
        window.addEventListener('mouseup', () => { clearTimeout(pressTimer); hideName(); });
        window.addEventListener('touchstart', () => pressTimer = setTimeout(showName, 500), {passive: true});
        window.addEventListener('touchend', () => { clearTimeout(pressTimer); hideName(); });
        window.addEventListener('contextmenu', (e) => e.preventDefault());

        document.getElementById('next-zone').addEventListener('click', () => {
            carousel.scrollBy({ left: carousel.offsetWidth, behavior: 'smooth' });
        });
        document.getElementById('prev-zone').addEventListener('click', () => {
            carousel.scrollBy({ left: -carousel.offsetWidth, behavior: 'smooth' });
        });

        loadImages();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Design Presentation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden; /* Prevents vertical bouncing/scrolling on iOS */
        }

        #carousel {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory; /* Creates the native swipe-to-snap feel */
            -webkit-overflow-scrolling: touch; /* Smooth momentum scrolling on iOS */
            scrollbar-width: none; /* Hides scrollbar in Firefox */
        }

        /* Hides scrollbar in Chrome/Safari/Edge */
        #carousel::-webkit-scrollbar {
            display: none; 
        }

        .slide {
            flex: 0 0 100vw;
            height: 100vh;
            scroll-snap-align: center; /* Snaps the image perfectly to the center */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Ensures the whole app design is visible without cropping */
        }
        
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #444;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="loader">Loading designs...</div>
    <div id="carousel"></div>

    <script>
        // ==========================================
        // CONFIGURATION: Update these 3 variables ONCE!
        // ==========================================
        const githubUsername = "YOUR_GITHUB_USERNAME"; 
        const githubRepo = "YOUR_REPO_NAME"; 
        const folderPath = "images"; // The name of the folder where you'll keep your screenshots
        // ==========================================

        const apiUrl = `https://api.github.com/repos/${githubUsername}/${githubRepo}/contents/${folderPath}`;
        const carousel = document.getElementById('carousel');
        const loader = document.getElementById('loader');

        async function loadImages() {
            try {
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error("Could not fetch. Check username, repo, and folder path.");
                }

                const files = await response.json();
                
                // Filter the folder contents for image files only
                const imageFiles = files.filter(file => 
                    file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)
                );

                if (imageFiles.length === 0) {
                    loader.innerText = "No images found in the folder.";
                    return;
                }

                // Generate the HTML for each image
                imageFiles.forEach(file => {
                    const slide = document.createElement('div');
                    slide.className = 'slide';
                    
                    const img = document.createElement('img');
                    img.src = file.download_url; // Grabs the raw image file
                    img.alt = file.name;
                    img.loading = "lazy"; // Helps load faster on mobile connections

                    slide.appendChild(img);
                    carousel.appendChild(slide);
                });

                // Hide the loading text once images are injected
                loader.style.display = 'none';

            } catch (error) {
                console.error("Error loading images:", error);
                loader.innerText = "Error loading images. Check console.";
            }
        }

        loadImages();
    </script>
</body>
</html>
